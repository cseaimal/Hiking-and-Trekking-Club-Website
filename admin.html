<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTC | Admin Control Panel</title>
    <style>
        :root {
            --forest: #0b221a;
            --gold: #f4a75a;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            background: #f0f2f5; 
            color: #333;
        }
        .container { max-width: 800px; margin: auto; }
        .box { 
            background: #fff; 
            padding: 30px; 
            margin-bottom: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border-left: 5px solid var(--forest);
        }
        h2 { color: var(--forest); margin-top: 0; font-size: 1.5rem; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; color: #666; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { 
            flex: 1;
            background: var(--forest); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #153a2d; transform: translateY(-2px); }
        button.secondary { background: #6c757d; }
        
        .output-container { position: relative; }
        textarea { 
            width: 100%; 
            height: 300px; 
            background: #1e1e1e; 
            color: #9cdcfe; 
            font-family: 'Consolas', monospace; 
            padding: 20px; 
            border-radius: 10px; 
            border: none;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .copy-hint {
            background: var(--gold);
            color: black;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--forest); margin-bottom: 40px;">HTC Data Manager</h1>

    <div class="box">
        <h2><i class="fas fa-user-plus"></i> Add Team Member</h2>
        
        <label>Section</label>
        <select id="type">
            <option value="leaders">Main Leaders (Cabinet)</option>
            <option value="advisory">Advisory Board</option>
            <option value="executives">Executive Body</option>
        </select>

        <label>Full Name</label>
        <input id="name" placeholder="e.g. Aimal Khan">

        <label>Role / Designation</label>
        <input id="role" placeholder="e.g. Club Captain / Alumni Advisor">

        <label>Image Path</label>
        <input id="image" placeholder="images/members/aimal.jpg">

        <div class="btn-group">
            <button onclick="addMember()">Add Member</button>
        </div>
    </div>

    <div class="box">
        <h2><i class="fas fa-images"></i> Add Gallery Image</h2>
        <label>Image URL/Path</label>
        <input id="galleryImg" placeholder="images/gallery/expedition_1.jpg">
        <button onclick="addImage()">Add to Gallery</button>
    </div>

    <div class="box">
        <h2><i class="fas fa-code"></i> Live JSON Data</h2>
        <div class="copy-hint">Step 2: Copy this code and paste it into your data.json file</div>
        <div class="output-container">
            <textarea id="output" readonly></textarea>
        </div>
        <div class="btn-group">
            <button class="secondary" onclick="copyToClipboard()">Copy JSON Code</button>
        </div>
    </div>
</div>

<script>
let data = {
    leaders: [],
    advisory: [],
    executives: [],
    tours: [],
    gallery: []
};

// 1. Load existing data from your data.json
fetch("data.json")
    .then(res => res.json())
    .then(d => { 
        data = d; 
        updateOutput(); 
    })
    .catch(err => console.log("Starting with new data structure"));

function addMember() {
    const type = document.getElementById("type").value;
    const name = document.getElementById("name").value;
    const role = document.getElementById("role").value;
    const image = document.getElementById("image").value;

    if(!name || !role) {
        alert("Please fill in Name and Role!");
        return;
    }

    // Add to the selected array
    data[type].push({
        name: name,
        role: role,
        image: image || "images/logo.png"
    });

    // Clear inputs
    document.getElementById("name").value = "";
    document.getElementById("role").value = "";
    document.getElementById("image").value = "";
    
    updateOutput();
    alert("Added successfully! Scroll down to copy the code.");
}

function addImage() {
    const imgPath = document.getElementById("galleryImg").value;
    if(!imgPath) return;
    
    data.gallery.push(imgPath);
    document.getElementById("galleryImg").value = "";
    updateOutput();
}

function updateOutput() {
    document.getElementById("output").value = JSON.stringify(data, null, 2);
}

function copyToClipboard() {
    const textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
    alert("JSON Copied! Now open data.json, delete everything, and paste this.");
}
</script>

</body>
</html>
