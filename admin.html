<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTC | Admin Control Panel</title>
    <style>
        :root {
            --forest: #0b221a;
            --gold: #f4a75a;
            --light-bg: #f0f2f5;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            background: var(--light-bg); 
            color: #333;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: auto; }
        .box { 
            background: #fff; 
            padding: 30px; 
            margin-bottom: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border-left: 5px solid var(--forest);
        }
        h2 { color: var(--forest); margin-top: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; color: #666; letter-spacing: 1px; }
        input, select, textarea.input-field { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        textarea.input-field { height: 80px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { 
            flex: 1;
            background: var(--forest); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #153a2d; transform: translateY(-2px); }
        button.secondary { background: #6c757d; }
        button.tour-btn { background: var(--gold); color: #000; }
        button.tour-btn:hover { background: #e39648; }
        
        #output { 
            width: 100%; 
            height: 400px; 
            background: #1e1e1e; 
            color: #9cdcfe; 
            font-family: 'Consolas', monospace; 
            padding: 20px; 
            border-radius: 10px; 
            border: none;
            font-size: 0.85rem;
            margin-top: 10px;
            white-space: pre;
        }
        .copy-hint {
            background: var(--gold);
            color: black;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--forest); margin-bottom: 40px;">HTC Data Manager</h1>

    <div class="box">
        <h2>Add Team Member</h2>
        <label>Section</label>
        <select id="type">
            <option value="leaders">Main Leaders (Cabinet)</option>
            <option value="advisory">Advisory Board</option>
            <option value="executives">Executive Body</option>
        </select>
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Full Name</label>
                <input id="name" placeholder="e.g. Aimal Khan">
            </div>
            <div style="flex: 1;">
                <label>Role / Designation</label>
                <input id="role" placeholder="e.g. Club Captain">
            </div>
        </div>
        <label>Quote (For Leaders/Advisory Only)</label>
        <input id="quote" placeholder="e.g. I am an explorer" value="I am an explorer">
        <label>Image Path</label>
        <input id="image" placeholder="images/members/aimal.jpg">
        <button onclick="addMember()">Add Member</button>
    </div>

    <div class="box" style="border-left-color: var(--gold);">
        <h2>Add Recent Tour/Expedition</h2>
        <label>Tour Title / Locations</label>
        <input id="tourTitle" placeholder="e.g. Malam Jabba Ski Resort">
        <label>Date</label>
        <input id="tourDate" placeholder="e.g. Sept 2025">
        <label>Status (e.g. recent or Memories)</label>
        <input id="tourStatus" placeholder="recent">
        <label>Cover Image Path</label>
        <input id="tourImg" placeholder="images/a4.jpg">
        <button class="tour-btn" onclick="addTour()">Add Tour to List</button>
    </div>

    <div class="box">
        <h2>Add Gallery Image</h2>
        <label>Image URL/Path</label>
        <input id="galleryImg" placeholder="images/gallery/photo1.jpg">
        <button onclick="addImage()">Add to Gallery</button>
    </div>

    <div class="box">
        <h2>Live JSON Data</h2>
        <div class="copy-hint">Copy this code and paste it into your data.json file</div>
        <textarea id="output" readonly></textarea>
        <div class="btn-group">
            <button class="secondary" onclick="copyToClipboard()">Copy JSON Code</button>
            <button class="secondary" style="background:#dc3545;" onclick="resetData()">Clear All Data</button>
        </div>
    </div>
</div>

<script>
let data = {
    leaders: [],
    advisory: [],
    executives: [],
    tours: [],
    gallery: []
};

// Auto-load existing data from your actual data.json
fetch("data.json")
    .then(res => res.json())
    .then(d => { 
        data = d; 
        updateOutput(); 
    })
    .catch(() => console.log("Starting with new data structure"));

function addMember() {
    const type = document.getElementById("type").value;
    const name = document.getElementById("name").value;
    const role = document.getElementById("role").value;
    const quote = document.getElementById("quote").value;
    const image = document.getElementById("image").value;

    if(!name || !role) return alert("Fill Name and Role");

    data[type].push({
        name: name,
        role: role,
        image: image || "images/logo.png",
        quote: quote || "I am an explorer"
    });

    clearInputs(['name', 'role', 'image']);
    updateOutput();
}

function addTour() {
    const title = document.getElementById("tourTitle").value;
    const date = document.getElementById("tourDate").value;
    const status = document.getElementById("tourStatus").value;
    const img = document.getElementById("tourImg").value;

    if(!title || !date) return alert("Fill Tour Title and Date");

    data.tours.push({
        name: title,
        image: img || "images/a4.jpg",
        status: status || "recent",
        date: date
    });

    clearInputs(['tourTitle', 'tourDate', 'tourStatus', 'tourImg']);
    updateOutput();
}

function addImage() {
    const imgPath = document.getElementById("galleryImg").value;
    if(!imgPath) return;
    data.gallery.push(imgPath);
    document.getElementById("galleryImg").value = "";
    updateOutput();
}

function updateOutput() {
    document.getElementById("output").value = JSON.stringify(data, null, 2);
}

function clearInputs(ids) {
    ids.forEach(id => {
        if(id !== 'quote') document.getElementById(id).value = "";
    });
}

function copyToClipboard() {
    const textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
    alert("Copied! Now open data.json, select all, and paste.");
}

function resetData() {
    if(confirm("This will clear the list. Existing data in your data.json file will NOT be deleted unless you copy-paste this empty version over it.")) {
        data = { leaders: [], advisory: [], executives: [], tours: [], gallery: [] };
        updateOutput();
    }
}
</script>

</body>
</html>
